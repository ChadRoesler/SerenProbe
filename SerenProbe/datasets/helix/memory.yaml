- tier: short
  ref: inc-auth-clockskew
  topic: incident,auth
  content: The auth service on port 8091 threw a wave of 401s after a JWT clock-skew bug on the 12th; team-atlas fixed it by widening leeway to 30 seconds.
- tier: short
  ref: inc-billing-deadlock
  topic: incident,billing
  content: billing (Java 21, PostgreSQL 16) deadlocked during the month-end run; team-ledger added a statement_timeout of 30s and a retry.
- tier: short
  ref: inc-search-oom
  topic: incident,search
  content: search (Python, Elasticsearch) OOM-killed under a query storm; team-atlas capped the result window and added a Redis 7 cache in front.
- tier: long
  ref: dec-ledger-cockroach
  topic: decision,ledger
  content: Chose CockroachDB for ledger over PostgreSQL for multi-region writes; team-ledger owns it, runs on VMs in us-west.
- tier: short
  ref: inc-gateway-cascade
  topic: incident,gateway
  content: A gateway (Go, port 8080) retry storm cascaded into auth; team-edge added a circuit breaker with a 2s budget.
- tier: long
  ref: run-notify-failover
  topic: runbook,notify
  content: 'notify (Node 20, MongoDB) failover runbook: promote the us-east replica, repoint the gateway, page team-edge.'
- tier: near
  ref: todo-auth-rotate
  topic: todo
  intent: Rotate the auth signing keys before the SOC2 audit and confirm gateway picks up the new JWKS.
- tier: near
  ref: todo-search-shard
  topic: todo
  intent: Reshard the search Elasticsearch cluster before the Q3 catalog import (expect 4x docs).
- tier: near
  ref: todo-billing-region
  topic: todo
  intent: Evaluate moving billing from us-west VMs onto Kubernetes to match the rest of the fleet.
