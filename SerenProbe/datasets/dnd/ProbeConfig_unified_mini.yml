# Unified ProbeConfig — all D&D realm stores + cross-entity corpora.
ProbeConfig:
  StartingPort: 7520
  DefaultQuestions: [datasets/dnd/cross/everything_questions.yaml]

  Memory:
    MemoryCount: 6
    MemoryConfigs:
    ###################################################
    # Characters: each has a Memory + a pair of Loci (vector + non-vector).
    ###################################################
      - Name: char_thorn-mem
        Port: 7520
        Seed: [datasets/dnd/char_thorn/memory.yaml]
        Questions: [datasets/dnd/char_thorn/questions.yaml]
      - Name: char_elara-mem
        Port: 7521
        Seed: [datasets/dnd/char_elara/memory.yaml]
        Questions: [datasets/dnd/char_elara/questions.yaml]
      - Name: char_shadowking-mem
        Port: 7530
        Seed: [datasets/dnd/char_shadowking/memory.yaml]
        Questions: [datasets/dnd/char_shadowking/questions.yaml]
      - Name: char_grickle-mem
        Port: 7531
        Seed: [datasets/dnd/char_grickle/memory.yaml]
        Questions: [datasets/dnd/char_grickle/questions.yaml]
    ###################################################
    # Locations: each has a Memory + a pair of Loci (vector + non-vector).
    ###################################################
      - Name: loc_ironhold-mem
        Port: 7536
        Seed: [datasets/dnd/loc_ironhold/memory.yaml]
        Questions: [datasets/dnd/loc_ironhold/questions.yaml]
      - Name: loc_aethelgard-mem
        Port: 7541
        Seed: [datasets/dnd/loc_aethelgard/memory.yaml]
        Questions: [datasets/dnd/loc_aethelgard/questions.yaml]
  Loci:
    LociCount: 6
    LociConfigs:
    ###################################################
    # Characters: each has a Memory + a pair of Loci (vector + non-vector).
    ###################################################
      - Name: char_thorn-loci-v
        Port: 7542
        Flags: [vector]
        Seed: [datasets/dnd/char_thorn/loci.yaml]
        Questions: [datasets/dnd/char_thorn/questions.yaml]
      - Name: char_elara-loci-v
        Port: 7544
        Flags: [vector]
        Seed: [datasets/dnd/char_elara/loci.yaml]
        Questions: [datasets/dnd/char_elara/questions.yaml]
      - Name: char_shadowking-loci-v
        Port: 7562
        Flags: [vector]
        Seed: [datasets/dnd/char_shadowking/loci.yaml]
        Questions: [datasets/dnd/char_shadowking/questions.yaml]
      - Name: char_grickle-loci-v
        Port: 7564
        Flags: [vector]
        Seed: [datasets/dnd/char_grickle/loci.yaml]
        Questions: [datasets/dnd/char_grickle/questions.yaml]
    ###################################################
    # Locations: each has a Memory + a pair of Loci (vector + non-vector).
    ###################################################
      - Name: loc_ironhold-loci-v
        Port: 7574
        Flags: [vector]
        Seed: [datasets/dnd/loc_ironhold/loci.yaml]
        Questions: [datasets/dnd/loc_ironhold/questions.yaml]
      - Name: loc_aethelgard-loci-v
        Port: 7584
        Flags: [vector]
        Seed: [datasets/dnd/loc_aethelgard/loci.yaml]
        Questions: [datasets/dnd/loc_aethelgard/questions.yaml]

  Corpus:
    CorpusRegrades:
      - Name: hop-sweep
        hops: [1, 2, 3]
      - Name: rrf-sweep
        rrf_k: [30, 60, 100]
      - Name: floor-sweep
        loci_floor: [0.0, 0.1, 0.3]
      - Name: weight-sweep
        loci_weight: [0.3, 0.5, 0.7, 1.0]
      - Name: packet-sweep
        n_results: [10, 15, 20, 30]
    CorpusCount: 9
    CorpusConfigs:
    ###################################################
    # Characters: each has a Memory + a pair of Loci (vector + non-vector).
    ###################################################
      - Name: char_thorn-scc-v
        Port: 7586
        Stores:
          - Store: char_thorn-loci-v
          - Store: char_thorn-mem
        Questions: [datasets/dnd/char_thorn/questions.yaml]
      - Name: char_elara-scc-v
        Port: 7588
        Stores:
          - Store: char_elara-loci-v
          - Store: char_elara-mem
        Questions: [datasets/dnd/char_elara/questions.yaml]
      - Name: char_shadowking-scc-v
        Port: 7606
        Stores:
          - Store: char_shadowking-loci-v
          - Store: char_shadowking-mem
        Questions: [datasets/dnd/char_shadowking/questions.yaml]
      - Name: char_grickle-scc-v
        Port: 7608
        Stores:
          - Store: char_grickle-loci-v
          - Store: char_grickle-mem
        Questions: [datasets/dnd/char_grickle/questions.yaml]
    ###################################################
    # Locations: each has a Memory + a pair of Loci (vector + non-vector).
    ###################################################
      - Name: loc_ironhold-scc-v
        Port: 7618
        Stores:
          - Store: loc_ironhold-loci-v
          - Store: loc_ironhold-mem
        Questions: [datasets/dnd/loc_ironhold/questions.yaml]
      - Name: loc_aethelgard-scc-v
        Port: 7628
        Stores:
          - Store: loc_aethelgard-loci-v
          - Store: loc_aethelgard-mem
        Questions: [datasets/dnd/loc_aethelgard/questions.yaml]
      - Name: cross-characters
        Port: 7630
        Stores:
          - Store: char_thorn-loci-v
          - Store: char_elara-loci-v
          - Store: char_shadowking-mem
          - Store: char_grickle-mem
        Questions: [datasets/dnd/cross/characters_questions.yaml]
      - Name: cross-geography
        Port: 7631
        Stores:
          - Store: loc_ironhold-loci-v
          - Store: loc_aethelgard-mem
        Questions: [datasets/dnd/cross/geography_questions.yaml]
      - Name: cross-everything
        Port: 7632
        Stores:
          - Store: char_thorn-loci-v
          - Store: char_elara-loci-v
          - Store: char_shadowking-loci-v
          - Store: char_grickle-loci-v
          - Store: loc_ironhold-mem
          - Store: loc_aethelgard-mem
        Questions: [datasets/dnd/cross/everything_questions.yaml]
