- tier: long
  ref: galaelinthorn_258_long_0
  topic: foundation, age_of_ashen
  content: 'In the beginning, was built around an old shrine that had long been a
    local landmark Shortly after, a new site was founded nearby: Galaelinthorn. This
    was the start of its story.  Structure and hierarchy shaped every aspect of life.  The
    village weathered every storm, small but unbroken.'
- tier: long
  ref: galaelinthorn_258_long_1
  topic: life_event, age_of_ashen
  content: The 79s (Age of Ashen, year 18) was a forgotten decade for Aeanoran. During
    this time, the village council was formed to settle disputes and plan for the
    future That decade taught Aeanoran that a good plan saves lives.  Rules governed
    all -- and all obeyed.  Village life continued -- planting, harvesting, living.
- tier: long
  ref: galaelinthorn_258_long_2
  topic: life_event, age_of_ashen
  content: In the 94s (Age of Ashen, year 33), the site felt still and waiting. The
    site grew -- the market was established, drawing traders from the surrounding
    lands It was a decade that shaped the site. The Scepter of the Fallen was held
    in the area.  Order and discipline prevailed.  The village prospered in its quiet
    way.
- tier: long
  ref: galaelinthorn_258_long_3
