- tier: long
  ref: evt-frostford
  topic: battle
  content: At the Battle of Frostford, House Ostry broke the Iron Pact line; Lord Corwin Vayne of Grimsgate was captured and ransomed.
- tier: long
  ref: evt-duskwater-siege
  topic: siege
  content: The Siege of Duskwater lasted a winter; Ser Aldous Belloc held the Shoals with a red kraken banner until the Crown relented.
- tier: long
  ref: evt-thornhold-pact
  topic: treaty
  content: The Thornhold Pact wed House Merrow to the Crown; Lady Wyn Merrow swore 'None Pass Us' before Lady Serane Ostry.
- tier: short
  ref: evt-sunspear-neutral
  topic: politics
  content: House Kael of Sunspear Keep declared neutrality in the Dunes, refusing both the Iron Pact and the Crown.
- tier: long
  ref: evt-ashfen-burning
  topic: battle
  content: The Burning of the Ashfen scattered House Vayne's harriers; they swore 'We Do Not Kneel' amid the ruin of Grimsgate.
- tier: near
  ref: omen-comet
  topic: prophecy
  intent: Watch for the red comet over the Reach — the maesters say it heralds a broken oath.
- tier: near
  ref: plot-kael-marriage
  topic: prophecy
  intent: Broker a marriage between House Kael and House Ostry to pull the Dunes to the Crown.
