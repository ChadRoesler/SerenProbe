- tier: long
  ref: chg-0.6-collapse
  topic: changelog
  content: 0.6 added lattice.reduce.collapse(fabric) -> Result; it raises EmptyError on an empty Fabric. Migrate old reduce() calls.
- tier: long
  ref: chg-0.5-shard
  topic: changelog
  content: 0.5 introduced lattice.dist.shard(n) returning a list; lattice.shard_count default rose from 1 to 4.
- tier: short
  ref: gotcha-weave-cycle
  topic: gotcha
  content: weave(nodes) raises CycleError if the node list forms a loop — dedupe and topo-sort before calling.
- tier: short
  ref: gotcha-strict-hydrate
  topic: gotcha
  content: With lattice.strict=true, hydrate(path) raises SchemaError on unknown keys instead of warning.
- tier: long
  ref: mig-0.3-io
  topic: migration
  content: 0.3 moved load() to lattice.io.hydrate(path); the old top-level load() is gone. Update imports.
- tier: near
  ref: plan-0.7-async
  topic: roadmap
  intent: Ship async collapse in 0.7 so lattice.reduce can stream partial Results.
- tier: near
  ref: plan-typed-cfg
  topic: roadmap
  intent: Add typed config validation so lattice.strict rejects wrong-typed keys at load.
