# ═══════════════════════════════════════════════════════════════════════
#  rhys-live.ProbeConfig.yml — eval against Rhys's REAL brain
# ═══════════════════════════════════════════════════════════════════════
#  This is the live-import feature in full action: instead of a synthetic
#  seed, three nodes carry a LiveStoreUrl and get their data COPIED from
#  the running Loci / Memory into throwaway containers.
#
#  READ-ONLY ON LIVE — STRUCTURALLY.
#  live_import.py only ever sends GETs to a LiveStoreUrl. Every write lands
#  on the container. A test asserts zero non-GET calls reach any live URL.
#  Your real stores cannot be touched by this run.
#
#  ── THE PORT RULE (learned the hard way) ────────────────────────────────
#  Container ports live in the 7500 band, DELIBERATELY clear of the
#  well-known Seren band (7420 memory / 7421 margin / 7422 loci / 7423 SCC).
#  A generator that defaulted into that band is what wrote a synthetic corpus
#  into a real brain. Never point a throwaway store at a real service port.
#
#  ── THE EXPERIMENT ─────────────────────────────────────────────────────
#  BOTH Loci nodes import from the SAME live Loci — one with the vector
#  embedder, one without. Same real facts, two retrieval strategies, graded
#  side by side. Then each gets its own SCC so the dockets are comparable.
#  (Landmine avoided: scc-v fans loci-v, scc-nv fans loci-nv. Pointing both
#  SCCs at one Loci is the silent failure mode.)
#
#  Adjust the LiveStoreUrl values to whatever THIS Probe process can reach.
# ═══════════════════════════════════════════════════════════════════════

ProbeConfig:
  StartingPort: 7500

  DefaultQuestions: datasets/rhys-live.questions.yaml

  Loci:
    LociCount: 2
    LociConfigs:
      # Same real facts, vector retrieval
      - Name: rhys-loci-v
        Port: 7501
        Flags: [vector]
        LiveStoreUrl: http://127.0.0.1:7422

      # Same real facts, lexical retrieval — the A/B
      - Name: rhys-loci-nv
        Port: 7502
        LiveStoreUrl: http://127.0.0.1:7422

  Memory:
    MemoryCount: 1
    MemoryConfigs:
      # Rhys's episodic memory: short + near + long, copied whole
      - Name: rhys-mem
        Port: 7503
        LiveStoreUrl: http://127.0.0.1:7420

  Corpus:
    CorpusRegrades:
      - Name: rrf-sweep         # RRF k: how sharply top ranks dominate the merge
        rrf_k: [30, 60, 100]
      - Name: floor-sweep       # drop weak loci hits (precision / abstention)
        loci_floor: [0.0, 0.1, 0.3]
      - Name: weight-sweep      # how hard to lean on the deterministic store
        loci_weight: [0.3, 0.5, 0.7, 1.0]
      - Name: packet-sweep      # briefing size - the coverage lever
        n_results: [10, 15, 20, 30]
      - Name: floor-x-weight    # the interaction of the two loci knobs
        loci_floor: [0.1, 0.3]
        loci_weight: [0.5, 1.0]
    CorpusCount: 2
    CorpusConfigs:
      # Left brain (vector) + right brain, fused
      - Name: rhys-scc-v
        Port: 7510
        Stores:
          - { Store: rhys-loci-v }
          - { Store: rhys-mem }

      # Left brain (lexical) + right brain, fused
      - Name: rhys-scc-nv
        Port: 7511
        Stores:
          - { Store: rhys-loci-nv }
          - { Store: rhys-mem }
