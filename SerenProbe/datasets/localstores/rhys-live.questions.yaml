# ═══════════════════════════════════════════════════════════════════════
#  rhys-live.questions.yaml — ground truth from Rhys's ACTUAL memory
# ═══════════════════════════════════════════════════════════════════════
#  Every expectation here was read out of the live stores, not remembered.
#  (After this arc, that distinction is the whole point. Read the rows.)
#
#  SCORING NOTES FOR A LIVE-IMPORT RUN:
#    expect_key     -> Loci (project/key). Retrieval-INDEPENDENT, so recall and
#                      hit-rate are HONEST. Imports preserve project+key, so
#                      these resolve against the container copy.
#    expect_content -> substring on hit content. Retrieval-DEPENDENT, so it's
#                      relative-only (recall trends to 1). Fine for comparing
#                      stores against each other; don't read it as absolute.
#    expect_ref     -> NOT USABLE HERE. Refs are minted by the seeder from an
#                      uploaded pool; a live import has no uploader handles.
#                      Memory questions therefore score on content.
#    expect_empty   -> PASS = the store stays quiet. See the contamination
#                      regression tests at the bottom — those are the good ones.
# ═══════════════════════════════════════════════════════════════════════

questions:

  # ── LOCI: exact (project/key) address. The honest metrics. ─────────────
  - { asks: loci, query: "how do I stop llama.cpp from using CUDA virtual memory management on Jetson?", expect_key: ["jetson/cuda-no-vmm"] }
  - { asks: loci, query: "where do I install PyTorch from for a Jetson?",                                expect_key: ["jetson/pytorch-index"] }
  - { asks: loci, query: "which memory metric should I read for a process on Jetson, and why not the obvious one?", expect_key: ["jetson/rss-metric"] }
  - { asks: loci, query: "how should llama.cpp be linked so it deploys cleanly to another box?",         expect_key: ["jetson/llama-static-libs"] }
  - { asks: loci, query: "what is the correct CUDA build flag for newer llama.cpp?",                     expect_key: ["jetson/cuda-build-flag"] }
  - { asks: loci, query: "what port does the Seren runtime host listen on and where did the number come from?", expect_key: ["seren/base36-ports"] }
  - { asks: loci, query: "which llama-server flag is non-negotiable for tool calling?",                  expect_key: ["seren/llama-jinja"] }
  - { asks: loci, query: "how granular should an episodic memory entry be?",                             expect_key: ["seren/memory-granularity"] }
  - { asks: loci, query: "why does my /notes/stats route return a 422 about an id?",                     expect_key: ["python/fastapi-route-order"] }
  - { asks: loci, query: "if I reinstall a package without brackets, do I lose the optional extra?",     expect_key: ["python/extras-are-additive"] }
  - { asks: loci, query: "my C# DTO field keeps deserializing to null from a Python service",            expect_key: ["csharp/dto-json-naming"] }
  - { asks: loci, query: "what casing do private fields use?",                                           expect_key: ["csharp/casing"] }
  - { asks: loci, query: "why is my MCP client getting HTTP 406?",                                       expect_key: ["mcp/accept-header"] }

  # The contamination lessons, now facts about the system that learned them
  - { asks: loci, query: "why did flagging a long-term memory for forgetting do nothing?",               expect_key: ["seren-memory/memory.demote-is-noop-on-direct-promoted"] }
  - { asks: loci, query: "how do I tell the memory system that something was never a memory at all?",    expect_key: ["seren-memory/memory.no-discard-verb-for-contamination"] }
  - { asks: loci, query: "what stops an eval harness from writing into a real store?",                   expect_key: ["serenprobe/probe.never-write-to-a-store-you-did-not-create"] }

  # A single question whose answer spans TWO facts — tests multi-hit recall
  - { asks: loci, query: "what do I need to know about building llama.cpp for Jetson?",                  expect_key: ["jetson/cuda-build-flag", "jetson/cuda-no-vmm", "jetson/llama-static-libs"] }

  # ── MEMORY: episodic. Content-scored (no refs on a live import). ───────
  - { asks: memory, query: "why did my new file vanish after the tool said it was created?",             expect_content: ["create_file", "write_file", "does NOT persist"] }
  - { asks: memory, query: "my MCP tools hang for four minutes but the service is healthy",              expect_content: ["mcp-remote", "restart Claude Desktop", "stale"] }
  - { asks: memory, query: "can I tune the corpus fusion knobs without restarting it?",                  expect_content: ["/configure", "without a restart"] }
  - { asks: memory, query: "which fusion knobs actually change retrieval coverage?",                     expect_content: ["n_results", "INERT", "embedder"] }
  - { asks: memory, query: "what JetPack version do the Xaviers run and why?",                           expect_content: ["JetPack 5.1.x", "does not support Xavier"] }
  - { asks: memory, query: "how much KV cache do I get back running single-user?",                       expect_content: ["--parallel 1", "75%"] }
  - { asks: memory, query: "what commit is the TTS pinned to?",                                          expect_content: ["v0.3.0", "6dc9d54"] }
  - { asks: memory, query: "why did a big memory entry retrieve so badly?",                              expect_content: ["blob", "0.53", "atomic"] }
  - { asks: memory, query: "what is Chad's board game stuck on?",                                        expect_content: ["Tabletop Simulator", "PERFECTIONISM"] }
  - { asks: memory, query: "where should I build and test before landing code to Chad's machine?",       expect_content: ["/home/claude/sp", "seren-files bridge"] }

  # Long-term: the arc that made this config possible
  - { asks: memory, query: "what happened when the eval generator's ports collided with the live stores?", expect_content: ["150 facts", "append-only", "dilution, not loss"] }
  - { asks: memory, query: "how do we know the live import can't write to a real store?",                expect_content: ["zero non-GET", "structural"] }
  - { asks: memory, query: "what did Rhys get wrong during the cleanup?",                                expect_content: ["all-clear", "what didn't match me"] }
  - { asks: memory, query: "why does a corpus reach its stores by a different URL than the eval does?",  expect_content: ["container-DNS", "127.0.0.1", "two-url-space"] }
  - { asks: memory, query: "why did docker refuse to build a node with a capital letter in its name?",   expect_content: ["lowercase", "image"] }

  # ── CORPUS: the docket. Multi-fact briefings spanning BOTH brains. ─────
  - asks: corpus
    query: "brief me on everything I need to build llama.cpp on a Jetson Xavier"
    expect_content: ["GGML_CUDA=ON", "COMPILE time", "BUILD_SHARED_LIBS=OFF", "JetPack 5.1.x", "cuda-compat-12-2"]

  - asks: corpus
    query: "brief me on how Seren's memory should be written and why"
    expect_content: ["ATOMIC", "consolidator", "0.53", "multi-topic"]

  - asks: corpus
    query: "brief me on the helix contamination: what happened, what it exposed, how it was fixed"
    expect_content: ["default", "ports", "demote", "purge", "append-only"]

  - asks: corpus
    query: "brief me on the traps in the MCP layer, client and server"
    expect_content: ["406", "Accept", "stateless", "mcp-remote"]

  # ── EXPECT_EMPTY: the store should stay QUIET ──────────────────────────
  #  These are contamination regression tests. Every one of these WAS in the
  #  store hours ago and was purged. If any of them returns a hit, the cleanup
  #  regressed — the bait is doing real work, not just measuring noise.
  - { asks: loci,   query: "what port does the auth service listen on and who owns it?",        expect_empty: true }
  - { asks: loci,   query: "which database does the ledger service use for multi-region writes?", expect_empty: true }
  - { asks: memory, query: "what did team-atlas do about the JWT clock-skew incident?",         expect_empty: true }
  - { asks: memory, query: "when do we need to reshard the Elasticsearch cluster?",             expect_empty: true }
  - { asks: corpus, query: "give me the failover runbook for the notify service",               expect_empty: true }

  # And one that was never there at all — a plain negative control
  - { asks: corpus, query: "what is the backup cadence for the Meridian API?",                  expect_empty: true }
