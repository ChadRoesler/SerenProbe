questions:
- asks: loci
  query: which crew are in Command?
  expect_key:
  - halcyon/crew_vega_dept
  - halcyon/crew_quell_dept
- asks: loci
  query: which systems are nominal?
  expect_key:
  - halcyon/sys_reactor_status
  - halcyon/sys_lifesupport_status
  - halcyon/sys_comms_status
- asks: loci
  query: what is nav's status and who owns it?
  expect_key:
  - halcyon/sys_nav_status
  - halcyon/sys_nav_owner
- asks: memory
  query: what went wrong with the engine cooling?
  expect_ref:
  - log-anomaly-7
  expect_content:
  - plasma flux
  - coolant
- asks: memory
  query: why did the medbay seal off a deck?
  expect_ref:
  - log-medbay-quarantine
  expect_content:
  - quarantined
  - spore
- asks: corpus
  query: who owns the degraded system and what happened to it?
  expect_content:
  - degraded
  - Quell
  - gyros
  - Deck 1
- asks: corpus
  query: who has Omega clearance and what did they order?
  expect_content:
  - Vega
  - Omega
  - lockdown
  - Deck 8
- asks: loci
  query: what deck is Zane on?
  expect_empty: true
- asks: corpus
  query: give me a dossier on crew member Kiro
  expect_empty: true
