- tier: short
  ref: log-anomaly-7
  topic: anomaly
  content: Deck 6 reported a plasma flux anomaly; Chief Engineer Orin (clearance Delta) traced it to a cracked reactor coolant line drawing 40 MW.
- tier: short
  ref: log-nav-degraded
  topic: incident
  content: Nav went degraded on Deck 1; Quell, the synth Nav Officer, rerouted through the backup gyros and paged Station Chief Vega.
- tier: long
  ref: log-medbay-quarantine
  topic: medical
  content: Medical Lead Sable (from Luna) quarantined Deck 3 after a cargo pallet from Mars tested positive for spore drift; Brix logged the manifest.
- tier: long
  ref: ord-vega-lockdown
  topic: order
  content: Station Chief Vega (clearance Omega) ordered a Deck 8 lockdown pending the spore screen; Cargo Master Brix complied.
- tier: short
  ref: log-reactor-drill
  topic: drill
  content: Orin ran a reactor scram drill; life support on Deck 4 held at 6 MW throughout.
- tier: near
  ref: todo-nav-parts
  topic: todo
  intent: Requisition replacement gyro bearings for the degraded nav system before the Europa transit.
- tier: near
  ref: todo-spore-clear
  topic: todo
  intent: Clear the Deck 8 lockdown once Sable signs off on the spore screen.
