name: CI / Release

on:
  push:
    branches: ["**"]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

# ── Test matrix ───────────────────────────────────────────────────────────
jobs:
  test:
    runs-on: ubuntu-latest
    name: "Test py${{ matrix.python-version }}"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm needs full history + tags

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev extras
        run: pip install -e ".[dev]"
        working-directory: SerenProbe
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"

      - name: Run tests
        run: python -m pytest tests/ -v
        working-directory: SerenProbe

# ── Build + GitHub Release (tags only) ────────────────────────────────────
  build-and-release:
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm reads the full tag graph

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build frontend
        run: pip install build

      - name: Build wheel and sdist
        # setuptools-scm derives the version from the git tag automatically.
        # No sed patching needed - __version__ is resolved at runtime via
        # importlib.metadata.
        run: python -m build
        working-directory: SerenProbe

      - name: Upload dist as artifact (handed to the publish job)
        uses: actions/upload-artifact@v4
        with:
          name: seren-probe-dist
          path: SerenProbe/dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: SerenProbe/dist/*
          generate_release_notes: true

# ── PyPI publish (Trusted Publishing, tokenless) ──────────────────────────
  pypi-publish:
    needs: [build-and-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/seren-probe
    permissions:
      id-token: write   # MANDATORY for Trusted Publishing; job-level = least privilege
    steps:
      - name: Download the built dist
        uses: actions/download-artifact@v4
        with:
          name: seren-probe-dist
          path: dist/

      - name: Publish to PyPI (tokenless)
        uses: pypa/gh-action-pypi-publish@release/v1
